# HealthRelay: the iPhone leg of the health plugin's live pipeline.
# Regenerate the Xcode project with: xcodegen generate (from this directory).
name: HealthRelay
options:
  bundleIdPrefix: com.s0nderlabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  HealthRelay:
    type: application
    platform: iOS
    sources:
      - HealthRelay
      - Shared
    dependencies:
      - target: HealthRelayWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s0nderlabs.HealthRelay
        PRODUCT_NAME: HealthRelay
        MARKETING_VERSION: "0.6.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4F2SRW2599
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    info:
      path: HealthRelay/Info.plist
      properties:
        CFBundleDisplayName: health
        # Empty dict = modern launch screen. Without this key iOS letterboxes
        # the app into a compatibility window (black bands, shrunken layout).
        UILaunchScreen: {}
        UIBackgroundModes: [bluetooth-central]
        NSSupportsLiveActivities: true
        NSBluetoothAlwaysUsageDescription: >-
          Receives your WHOOP band's Broadcast Heart Rate over Bluetooth and
          relays it to your health daemon at home.
        NSHealthShareUsageDescription: >-
          Reads WHOOP-recorded step counts from Apple Health so your health
          daemon can see daily movement. Nothing is written back.
        NSHealthUpdateUsageDescription: >-
          Not used. The app never writes health data.
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    entitlements:
      path: HealthRelay/HealthRelay.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        # Time Sensitive Notifications is NOT here on purpose: personal
        # (free) teams cannot hold that capability, and requesting it makes
        # profile generation fail outright. Paid-team forks can add it plus
        # interruptionLevel = .timeSensitive to pierce Focus.

  HealthRelayWidgets:
    type: app-extension
    platform: iOS
    sources:
      - HealthRelayWidgets
      - Shared
      - HealthRelay/UI/Theme.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.s0nderlabs.HealthRelay.widgets
        PRODUCT_NAME: HealthRelayWidgets
        MARKETING_VERSION: "0.6.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 4F2SRW2599
        SKIP_INSTALL: YES
    info:
      path: HealthRelayWidgets/Info.plist
      properties:
        CFBundleDisplayName: health
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
